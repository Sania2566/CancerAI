<style>
    body,html{
margin:0;
padding:0;
height:100%;
font-family:Arial;
background:#f2f4f8;
}

/* MAP AREA */

.map-area{
position:absolute;
top:0;
left:0;
right:0;
bottom:45vh;   /* space for bottom hospital panel */
}

#map{
height:100%;
width:100%;
}
.map-placeholder{
text-align:center;
color:#555;
}


/* BOTTOM PANEL */

.hospital-panel{
position:fixed;
bottom:0;
left:240px;          /* same width as sidebar */
width:calc(100% - 240px);  /* remaining space */
background:rgb(8, 87, 80);
border-top-left-radius:30px;
border-top-right-radius:30px;
padding:25px;
box-shadow:0 -10px 30px rgba(0,0,0,0.15);
height:45vh;
overflow-y:auto;
color: #19b9a4;
}

/* HEADER */

.panel-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.panel-header h3{
margin:0;
font-weight:600;
}

.distance{
font-weight:bold;
color:#555;
}


/* BUTTONS */

.quick-actions{
display:flex;
gap:10px;
margin-bottom:15px;
}

.action-btn{
flex:1;
border:none;
padding:12px;
border-radius:12px;
background:#f0f0f0;
font-weight:500;
cursor:pointer;
transition:0.3s;
}

.action-btn:hover{
background:#dff5ee;
}


/* INPUT */

#manualCity{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:15px;
}


/* RESULTS */

.result-card{
background:#fafafa;
padding:15px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.result-card h5{
margin-bottom:5px;
}

.result-card p{
margin:0;
font-size:14px;
color:#555;
}

.result-card a{
margin-top:8px;
display:inline-block;
}
body{
background:#eaf7f1;
font-family: 'Segoe UI', sans-serif;
margin:0;
}

/* Layout */
.app-layout{
display:flex;
height:100vh;
}

/* Sidebar */
.sidebar{
width:240px;
background:#cdeee1;
padding:30px 20px;
box-shadow:2px 0 10px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
}

.logo{
color:#2f6f5e;
margin-bottom:30px;
}

.sidebar a{
text-decoration:none;
color:#2f6f5e;
padding:12px;
border-radius:10px;
margin-bottom:10px;
font-weight:500;
transition:0.2s;
}

.sidebar a:hover{
background:#a8e3cd;
}

/* Main content */
.main-content{
flex:1;
position:relative;
overflow:hidden;
}

/* Cards */
.container-box{
background:#ffffff;
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* Buttons */
.btn{
border-radius:30px;
background:#9adbc4;
border:none;
color:#134f42;
font-weight:600;
}

.btn:hover{
background:#7bcfb3;
}
</style>
</head>
<body>
<div class="app-layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2 class="logo">🌿 CancerAI</h2>

        <a href="/analysis">🫀Analysis</a>
        <a href="/chatbot">💬Chatbot</a>
        <a href="/dashboard">📊 Dashboard</a>
        <a href="/awareness">📘 Awareness</a>
        <a href="/report-analyzer">📄 Report Analyzer</a>
        <a href="/profile">👤 Profile</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Map Section -->
<div class="map-area">
    <div id="map"></div>
</div>

<!-- Bottom Panel -->
<div class="hospital-panel">

    <div class="panel-header">
        <div>
            <h3>Nearest Hospital</h3>
            <p class="small">Search nearby cancer hospitals</p>
        </div>
        <span class="distance">Live</span>
    </div>


    <!-- Buttons -->
    <div class="quick-actions">

        <button onclick="detectLocation()" class="action-btn">
            📍 Detect Location
        </button>

        <button onclick="manualLocation()" class="action-btn">
            🔎 Search
        </button>

    </div>


    <!-- Manual City -->
    <input type="text" id="manualCity" placeholder="Enter city or address">


    <!-- Results -->
    <div id="results" class="results-box"></div>

</div>




<div class="bot-msg" id="botMsg">Hi! I can guide you to find hospitals nearby!😊🗺️📌</div>

<script>

    let map = L.map('map').setView([20,78],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

let userMarker;
let hospitalMarkers = [];
// Dynamic messages
let botMessages = [
    ">> Click 'Detect My Location' to find nearby hospitals!📍",
    ">> Or type your city above and press Search!🔎",
    ">> I'm here to guide you 😉",
    ">> Stay safe and healthy! 💚"
];
let msgIndex = 0;

function showBotMessage(text){
    const msg = document.getElementById("botMsg");
    msg.innerText = text;
    msg.style.fontSize = (text.length > 60) ? "14px" : "16px";
}

setInterval(() => { 
    showBotMessage(botMessages[msgIndex]); 
    msgIndex = (msgIndex + 1) % botMessages.length; 
}, 7000);

// Location functions
function detectLocation(){
    if(!navigator.geolocation){ alert("Geolocation not supported"); return; }
    navigator.geolocation.getCurrentPosition(
        function(position){
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;
            fetchHospitals(lat, lon);
        },
        function(error){ alert("Allow location access."); }
    );
}

function manualLocation(){
    let city = document.getElementById("manualCity").value.trim();
    if(city === ""){ alert("Please enter a city"); return; }
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`)
    .then(res => res.json())
    .then(data => {
        if(data.length === 0){ alert("Location not found"); return; }
        let lat = parseFloat(data[0].lat);
        let lon = parseFloat(data[0].lon);
        fetchHospitals(lat, lon);
    })
    .catch(err => { alert("Error finding location"); });
}

function fetchHospitals(lat, lon){

    if(userMarker){
        map.removeLayer(userMarker);
    }

    userMarker = L.marker([lat,lon])
        .addTo(map)
        .bindPopup("📍 Your Location")
        .openPopup();

    map.setView([lat,lon],12);

    hospitalMarkers.forEach(m=>map.removeLayer(m));
    hospitalMarkers=[];

    fetch("/nearest_hospitals",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({lat, lon})
    })
    .then(res=>res.json())
    .then(data=>{

        let results = document.getElementById("results");
        results.innerHTML="";

        if(data.length===0){
            results.innerHTML="<p>No hospitals found.</p>";
            return;
        }

        data.forEach(h=>{

            results.innerHTML+=`
            <div class="result-card">
                <h5>${h.name}</h5>
                <p>${h.city}, ${h.country}</p>
                <p>⭐ Rating: ${h.rating}</p>
                <p>📍 Distance: ${h.distance} km</p>
                <a href="${h.maps}" target="_blank" class="btn btn-primary btn-sm mt-2">Open Map</a>
            </div>`;

            if(h.lat && h.lon){
                let marker = L.marker([h.lat, h.lon])
                    .addTo(map)
                    .bindPopup(`<b>${h.name}</b><br>${h.city}`);

                hospitalMarkers.push(marker);
            }

        });

    })
    .catch(err=>alert("Error fetching hospitals"));
}
</script>
    </div>

</div>


</body>
</html>
