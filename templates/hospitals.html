<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Cancer Hospitals — Cancer AI Assistant</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --teal: #0d9488;
    --teal-light: #14b8a6;
    --purple: #7c3aed;
    --grad-main: linear-gradient(135deg, #2563eb 0%, #0d9488 50%, #7c3aed 100%);
    --grad-hero: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #0c4a6e 100%);
    --shadow-glow-blue: 0 0 40px rgba(37,99,235,0.3);
  }

  *, *::before, *::after { box-sizing: border-box; }

  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Poppins', sans-serif;
    background: var(--grad-hero);
    color: white;
  }

  /* APP LAYOUT */
  .app-layout {
    display: flex;
    height: 100vh;
  }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255,255,255,0.1);
    padding: 28px 18px;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    z-index: 10;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 30px;
    padding: 0 8px;
  }

  .brand-icon {
    width: 36px; height: 36px;
    background: var(--grad-main);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 15px;
    box-shadow: var(--shadow-glow-blue);
    flex-shrink: 0;
  }

  .brand-text {
    font-size: 0.98rem;
    font-weight: 700;
    background: var(--grad-main);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sidebar a {
    text-decoration: none;
    color: rgba(255,255,255,0.65);
    padding: 11px 14px;
    border-radius: 10px;
    margin-bottom: 6px;
    font-weight: 500;
    font-size: 0.88rem;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s ease;
  }

  .sidebar a i {
    width: 16px;
    text-align: center;
    color: var(--teal-light);
    font-size: 0.85rem;
  }

  .sidebar a:hover {
    background: rgba(255,255,255,0.07);
    color: white;
  }

  .sidebar a.active {
    background: rgba(37,99,235,0.18);
    border: 1px solid rgba(37,99,235,0.3);
    color: white;
  }

  /* MAIN CONTENT */
  .main-content {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* Background orbs (subtle, behind map) */
  .main-content::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 70%);
    top: -120px; right: -120px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  /* MAP AREA */
  .map-area {
    position: absolute;
    top: 0; left: 0; right: 0;
    bottom: 45vh;
  }

  #map {
    height: 100%;
    width: 100%;
    filter: saturate(0.85) brightness(0.95);
  }

  /* BOTTOM PANEL */
  .hospital-panel {
    position: fixed;
    bottom: 0;
    left: 240px;
    width: calc(100% - 240px);
    background: rgba(15,23,42,0.85);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid rgba(255,255,255,0.12);
    border-top-left-radius: 28px;
    border-top-right-radius: 28px;
    padding: 26px 30px;
    box-shadow: 0 -20px 60px rgba(0,0,0,0.35);
    height: 45vh;
    overflow-y: auto;
    z-index: 20;
  }

  /* HEADER */
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .panel-header h3 {
    margin: 0;
    font-weight: 700;
    font-size: 1.15rem;
    color: white;
  }

  .panel-header .small {
    color: rgba(255,255,255,0.5);
    font-size: 0.82rem;
    margin: 2px 0 0;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(13,148,136,0.18);
    border: 1px solid rgba(13,148,136,0.35);
    color: #5eead4;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 50px;
  }

  .live-badge .dot {
    width: 6px; height: 6px;
    background: #34d399;
    border-radius: 50%;
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* QUICK ACTIONS */
  .quick-actions {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .action-btn {
    flex: 1;
    border: 1px solid rgba(255,255,255,0.14);
    padding: 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.9);
    font-weight: 600;
    font-size: 0.86rem;
    font-family: 'Poppins', sans-serif;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .action-btn:hover {
    background: rgba(37,99,235,0.18);
    border-color: rgba(37,99,235,0.35);
    transform: translateY(-2px);
  }

  /* INPUT */
  #manualCity {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.06);
    color: white;
    font-family: 'Poppins', sans-serif;
    font-size: 0.88rem;
    margin-bottom: 18px;
    transition: all 0.25s ease;
  }

  #manualCity::placeholder {
    color: rgba(255,255,255,0.4);
  }

  #manualCity:focus {
    outline: none;
    border-color: rgba(37,99,235,0.5);
    background: rgba(37,99,235,0.1);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
  }

  /* RESULTS */
  .results-box {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .result-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 18px;
    border-radius: 14px;
    transition: all 0.25s ease;
  }

  .result-card:hover {
    background: rgba(255,255,255,0.09);
    transform: translateY(-3px);
  }

  .result-card h5 {
    margin-bottom: 6px;
    font-size: 0.95rem;
    font-weight: 700;
    color: white;
  }

  .result-card p {
    margin: 0 0 3px;
    font-size: 0.82rem;
    color: rgba(255,255,255,0.6);
  }

  .result-card a {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--grad-main);
    color: white;
    text-decoration: none;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 50px;
    transition: all 0.25s ease;
  }

  .result-card a:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(37,99,235,0.4);
  }

  /* BOT */
  svg.bot {
    width: 200px;
    position: fixed;
    bottom: calc(45vh + 20px);
    left: 20px;
    z-index: 1000;
  }

  .bot-msg {
    width: 230px;
    max-width: 230px;
    word-wrap: break-word;
    overflow-wrap: break-word;
    background: rgba(15,23,42,0.92);
    border: 1px solid rgba(255,255,255,0.14);
    backdrop-filter: blur(10px);
    color: rgba(255,255,255,0.9);
    padding: 12px 18px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    font-size: 0.85rem;
    z-index: 1000;
    position: fixed;
    bottom: calc(45vh + 20px);
    left: 20px;
    transition: 0.5s;
  }

  /* SCROLLBAR for panel */
  .hospital-panel::-webkit-scrollbar { width: 6px; }
  .hospital-panel::-webkit-scrollbar-track { background: transparent; }
  .hospital-panel::-webkit-scrollbar-thumb { background: var(--grad-main); border-radius: 6px; }

  /* SIDEBAR TOGGLE (mobile) */
  .sidebar-toggle {
    display: none;
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 2100;
    width: 42px;
    height: 42px;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(15,23,42,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: white;
    font-size: 1.05rem;
    cursor: pointer;
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 1900;
  }

  @media (max-width: 768px) {
    .sidebar-toggle { display: flex; }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 240px;
      padding: 28px 18px;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 2000;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.show { display: block; }
    .hospital-panel { left: 0; width: 100%; }
    svg.bot, .bot-msg { display: none; }
  }
</style>
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle menu"><i class="fa-solid fa-bars"></i></button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon"><i class="fa-solid fa-heart-pulse"></i></div>
          <span class="brand-text">Cancer AI Assistant</span>
        </div>

        <a href="/analysis"><i class="fa-solid fa-heart-pulse"></i>Analysis</a>
        <a href="/dashboard"><i class="fa-solid fa-chart-line"></i>Dashboard</a>
        <a href="/chatbot"><i class="fa-solid fa-comment-medical"></i>Chatbot</a>
        <a href="/hospitals" class="active"><i class="fa-solid fa-hospital"></i>Hospitals</a>
        <a href="/awareness"><i class="fa-solid fa-book-open"></i>Awareness</a>
        <a href="/report-analyzer"><i class="fa-solid fa-file-medical"></i>Report Analyzer</a>
        <a href="/profile"><i class="fa-solid fa-user"></i>Profile</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Map Section -->
<div class="map-area">
    <div id="map"></div>
</div>

<!-- Bottom Panel -->
<div class="hospital-panel">

    <div class="panel-header">
        <div>
            <h3>Nearest Hospital</h3>
            <p class="small">Search nearby cancer hospitals</p>
        </div>
        <span class="live-badge"><span class="dot"></span>Live</span>
    </div>


    <!-- Buttons -->
    <div class="quick-actions">

        <button onclick="detectLocation()" class="action-btn">
            <i class="fa-solid fa-location-crosshairs"></i> Detect Location
        </button>

        <button onclick="manualLocation()" class="action-btn">
            <i class="fa-solid fa-magnifying-glass"></i> Search
        </button>

    </div>


    <!-- Manual City -->
    <input type="text" id="manualCity" placeholder="Enter city or address">


    <!-- Results -->
    <div id="results" class="results-box"></div>

</div>




<div class="bot-msg" id="botMsg">Hi! I can guide you to find hospitals nearby!😊🗺️📌</div>

<script>

    let map = L.map('map').setView([20,78],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

let userMarker;
let hospitalMarkers = [];
// Dynamic messages
let botMessages = [
    ">> Click 'Detect My Location' to find nearby hospitals!📍",
    ">> Or type your city above and press Search!🔎",
    ">> I'm here to guide you 😉",
    ">> Stay safe and healthy! 💚"
];
let msgIndex = 0;

function showBotMessage(text){
    const msg = document.getElementById("botMsg");
    msg.innerText = text;
    msg.style.fontSize = (text.length > 60) ? "14px" : "16px";
}

setInterval(() => { 
    showBotMessage(botMessages[msgIndex]); 
    msgIndex = (msgIndex + 1) % botMessages.length; 
}, 7000);

// Location functions
function detectLocation(){
    if(!navigator.geolocation){ alert("Geolocation not supported"); return; }
    navigator.geolocation.getCurrentPosition(
        function(position){
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;
            fetchHospitals(lat, lon);
        },
        function(error){ alert("Allow location access."); }
    );
}

function manualLocation(){
    let city = document.getElementById("manualCity").value.trim();
    if(city === ""){ alert("Please enter a city"); return; }
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`)
    .then(res => res.json())
    .then(data => {
        if(data.length === 0){ alert("Location not found"); return; }
        let lat = parseFloat(data[0].lat);
        let lon = parseFloat(data[0].lon);
        fetchHospitals(lat, lon);
    })
    .catch(err => { alert("Error finding location"); });
}

function fetchHospitals(lat, lon){

    if(userMarker){
        map.removeLayer(userMarker);
    }

    userMarker = L.marker([lat,lon])
        .addTo(map)
        .bindPopup("📍 Your Location")
        .openPopup();

    map.setView([lat,lon],12);

    hospitalMarkers.forEach(m=>map.removeLayer(m));
    hospitalMarkers=[];

    fetch("/nearest_hospitals",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({lat, lon})
    })
    .then(res=>res.json())
    .then(data=>{

        let results = document.getElementById("results");
        results.innerHTML="";

        if(data.length===0){
            results.innerHTML="<p>No hospitals found.</p>";
            return;
        }

        data.forEach(h=>{

            results.innerHTML+=`
            <div class="result-card">
                <h5>${h.name}</h5>
                <p>${h.city}, ${h.country}</p>
                <p>⭐ Rating: ${h.rating}</p>
                <p>📍 Distance: ${h.distance} km</p>
                <a href="${h.maps}" target="_blank">Open Map</a>
            </div>`;

            if(h.lat && h.lon){
                let marker = L.marker([h.lat, h.lon])
                    .addTo(map)
                    .bindPopup(`<b>${h.name}</b><br>${h.city}`);

                hospitalMarkers.push(marker);
            }

        });

    })
    .catch(err=>alert("Error fetching hospitals"));
}
</script>
    </div>

</div>


<script>
(function(){
  var sidebar = document.querySelector('.sidebar');
  var toggle = document.getElementById('sidebarToggle');
  var overlay = document.getElementById('sidebarOverlay');
  if(!sidebar || !toggle || !overlay) return;
  function closeSidebar(){
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  }
  function openSidebar(){
    sidebar.classList.add('open');
    overlay.classList.add('show');
  }
  toggle.addEventListener('click', function(){
    if(sidebar.classList.contains('open')){ closeSidebar(); } else { openSidebar(); }
  });
  overlay.addEventListener('click', closeSidebar);
  sidebar.querySelectorAll('a').forEach(function(link){
    link.addEventListener('click', closeSidebar);
  });
  window.addEventListener('resize', function(){
    if(window.innerWidth > 768){ closeSidebar(); }
  });
})();
</script>
</body>
</html>
