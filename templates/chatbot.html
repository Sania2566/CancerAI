<!DOCTYPE html>
<html>
<head>

<title>CuraBot AI — Cancer AI Assistant</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --teal: #0d9488;
  --teal-light: #14b8a6;
  --purple: #7c3aed;
  --grad-main: linear-gradient(135deg, #2563eb 0%, #0d9488 50%, #7c3aed 100%);
  --grad-hero: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #0c4a6e 100%);
  --shadow-glow-blue: 0 0 40px rgba(37,99,235,0.3);
}

*, *::before, *::after { box-sizing: border-box; }

body{
margin:0;
font-family:'Poppins', sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: var(--grad-hero);
overflow:hidden;
color: white;
position: relative;
}

/* BACKGROUND GLOW ORBS */

body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background: radial-gradient(circle, rgba(37,99,235,0.28) 0%, transparent 70%);
filter:blur(60px);
top:-120px;
left:200px;
z-index: 0;
}

body::after{
content:"";
position:fixed;
width:450px;
height:450px;
background: radial-gradient(circle, rgba(124,58,237,0.22) 0%, transparent 70%);
filter:blur(60px);
bottom:-100px;
right:-80px;
z-index: 0;
}

/* MAIN CARD */

.chat-wrapper{
width:400px;
background:rgba(255,255,255,0.07);
border: 1px solid rgba(255,255,255,0.13);
backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);
border-radius:24px;
padding:24px;
box-shadow:0 30px 80px rgba(0,0,0,0.35);
position: relative;
z-index: 2;
}

/* HEADER */

.hero{
text-align:center;
margin-bottom:16px;
}

.hero-avatar {
  width: 72px; height: 72px;
  border-radius: 18px;
  background: var(--grad-main);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  font-size: 30px;
  color: white;
  box-shadow: 0 10px 30px rgba(37,99,235,0.4);
}

.hero h4{
margin-top:6px;
font-weight:700;
color:white;
font-size: 1.15rem;
}

.hero p{
font-size:13px;
color:rgba(255,255,255,0.55);
margin: 2px 0 0;
}

/* CHAT AREA */

.chat-box{
height:260px;
overflow-y:auto;
background:rgba(0,0,0,0.18);
border: 1px solid rgba(255,255,255,0.08);
border-radius:16px;
padding:14px;
}

.chat-box::-webkit-scrollbar { width: 5px; }
.chat-box::-webkit-scrollbar-track { background: transparent; }
.chat-box::-webkit-scrollbar-thumb { background: var(--grad-main); border-radius: 6px; }

/* MESSAGES */

.user{
text-align:right;
margin:6px 0;
}

.bot{
text-align:left;
margin:6px 0;
}

.message{
display:inline-block;
padding:10px 15px;
border-radius:16px;
max-width:78%;
font-size:13.5px;
line-height: 1.5;
}

.user .message{
background: var(--grad-main);
color:white;
}

.bot .message{
background:rgba(255,255,255,0.09);
color: rgba(255,255,255,0.9);
border: 1px solid rgba(255,255,255,0.08);
}

/* QUICK BUTTONS */

.quick-buttons{
display:flex;
flex-wrap:wrap;
gap:7px;
margin-bottom:10px;
}

.quick-buttons button{
border: 1px solid rgba(255,255,255,0.14);
background:rgba(255,255,255,0.06);
padding:6px 13px;
border-radius:14px;
font-size:12px;
font-weight: 500;
color: rgba(255,255,255,0.8);
font-family: 'Poppins', sans-serif;
cursor: pointer;
transition: all 0.2s ease;
}

.quick-buttons button:hover {
  background: rgba(37,99,235,0.18);
  border-color: rgba(37,99,235,0.35);
  color: white;
}

/* INPUT */

.input-area{
display:flex;
margin-top:12px;
gap: 8px;
}

.input-area input{
flex:1;
border: 1px solid rgba(255,255,255,0.13);
background:rgba(255,255,255,0.07);
color: white;
padding:11px 16px;
border-radius:50px;
font-family: 'Poppins', sans-serif;
font-size: 0.88rem;
}

.input-area input::placeholder {
  color: rgba(255,255,255,0.4);
}

.input-area input:focus {
  outline: none;
  border-color: rgba(37,99,235,0.5);
  background: rgba(37,99,235,0.1);
}

.send-btn{
border:none;
background: var(--grad-main);
color:white;
border-radius:50%;
width: 42px;
height: 42px;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: all 0.25s ease;
box-shadow: 0 6px 20px rgba(37,99,235,0.4);
}

.send-btn:hover {
  transform: translateY(-2px) scale(1.05);
}

/* SIDEBAR */

.sidebar{
width:230px;
height:100vh;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-right: 1px solid rgba(255,255,255,0.1);
color:white;
position:fixed;
left:0;
top:0;
padding:28px 16px;
z-index: 10;
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 26px;
  padding: 0 6px;
}

.brand-icon {
  width: 36px; height: 36px;
  background: var(--grad-main);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 15px;
  box-shadow: var(--shadow-glow-blue);
  flex-shrink: 0;
}

.brand-text {
  font-size: 0.95rem;
  font-weight: 700;
  background: var(--grad-main);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.sidebar a{
display: flex;
align-items: center;
gap: 10px;
padding:11px 14px;
color:rgba(255,255,255,0.65);
text-decoration:none;
margin-bottom:6px;
border-radius:10px;
font-size: 0.88rem;
font-weight: 500;
transition:all 0.2s ease;
}
.sidebar a i {
  width: 16px;
  text-align: center;
  color: var(--teal-light);
  font-size: 0.85rem;
}

.sidebar a:hover{
background:rgba(255,255,255,0.07);
color: white;
}

.sidebar a.active {
  background: rgba(37,99,235,0.18);
  border: 1px solid rgba(37,99,235,0.3);
  color: white;
}

@media (max-width: 768px) {
  .sidebar { display: none; }
}

/* HEADER CONTROLS */

.hero-controls {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 14px;
}

.icon-btn {
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.65);
  width: 32px;
  height: 32px;
  border-radius: 9px;
  font-size: 0.78rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.icon-btn:hover {
  background: rgba(37,99,235,0.18);
  border-color: rgba(37,99,235,0.35);
  color: white;
}

.icon-btn.on {
  background: var(--grad-main);
  border-color: transparent;
  color: white;
}

/* TIMESTAMP */

.msg-time {
  display: block;
  font-size: 0.62rem;
  color: rgba(255,255,255,0.35);
  margin-top: 3px;
}

.user .msg-time { text-align: right; }
.bot .msg-time { text-align: left; }

/* COPY BUTTON ON BOT MESSAGES */

.bot {
  position: relative;
}

.msg-row {
  display: inline-flex;
  align-items: flex-start;
  gap: 6px;
  max-width: 100%;
}

.copy-btn {
  border: none;
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.4);
  width: 24px;
  height: 24px;
  border-radius: 7px;
  font-size: 0.68rem;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 2px;
  opacity: 0;
  transition: all 0.2s ease;
}

.bot:hover .copy-btn {
  opacity: 1;
}

.copy-btn:hover {
  background: rgba(37,99,235,0.2);
  color: white;
}

.copy-btn.copied {
  color: #5eead4;
  opacity: 1;
}

/* TYPING INDICATOR */

.typing-dots {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 12px 16px;
}

.typing-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.55);
  animation: typingBounce 1.2s infinite ease-in-out;
}

.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* FOCUS MODE — dims chrome, keeps chat as the only bright element */

body.focus-mode .sidebar {
  opacity: 0.25;
  filter: blur(1px);
}

body.focus-mode::before,
body.focus-mode::after {
  opacity: 0.4;
}

body.focus-mode .chat-wrapper {
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 40px 100px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<div class="sidebar">

<div class="sidebar-brand">
  <div class="brand-icon"><i class="fa-solid fa-heart-pulse"></i></div>
  <span class="brand-text">Cancer AI Assistant</span>
</div>

<a href="/analysis">
<i class="fa-solid fa-chart-line"></i> Analysis
</a>

<a href="/dashboard">
<i class="fa-solid fa-chart-line"></i> Dashboard
</a>

<a href="/chatbot" class="active">
<i class="fa-solid fa-robot"></i> Chatbot
</a>

<a href="/hospitals">
<i class="fa-solid fa-hospital"></i> Hospitals
</a>

<a href="/awareness">
<i class="fa-solid fa-ribbon"></i> Awareness
</a>

<a href="/report-analyzer">
<i class="fa-solid fa-file-medical"></i> Report Analyzer
</a>
<a href="/profile">
<i class="fa-solid fa-user"></i> Profile
</a>
</div>

<div class="chat-wrapper">

<div class="hero">

<div class="hero-avatar"><i class="fa-solid fa-robot"></i></div>

<h4>CuraBot AI</h4>
<p>Your smart healthcare assistant</p>

<div class="hero-controls">
  <button class="icon-btn" id="focusToggle" onclick="toggleFocus()" title="Focus mode">
    <i class="fa-solid fa-moon"></i>
  </button>
  <button class="icon-btn" onclick="clearChat()" title="Clear conversation">
    <i class="fa-solid fa-broom"></i>
  </button>
</div>

</div>

<div class="quick-buttons">

<button onclick="quickMsg('fever')">Fever</button>
<button onclick="quickMsg('headache')">Headache</button>
<button onclick="quickMsg('cold')">Cold</button>
<button onclick="quickMsg('cough')">Cough</button>

</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">

<input id="userInput" placeholder="Ask your health question...">

<button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>

</div>

</div>

<script>

function timeNow(){
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function addMessage(text,sender){

let box=document.getElementById("chatBox")

let div=document.createElement("div")
div.className=sender

if(sender === "bot"){
  let row=document.createElement("div")
  row.className="msg-row"

  let msg=document.createElement("span")
  msg.className="message"
  msg.innerText=text

  let copyBtn=document.createElement("button")
  copyBtn.className="copy-btn"
  copyBtn.innerHTML='<i class="fa-solid fa-copy"></i>'
  copyBtn.title="Copy reply"
  copyBtn.onclick=function(){
    navigator.clipboard.writeText(text).then(()=>{
      copyBtn.innerHTML='<i class="fa-solid fa-check"></i>'
      copyBtn.classList.add("copied")
      setTimeout(()=>{
        copyBtn.innerHTML='<i class="fa-solid fa-copy"></i>'
        copyBtn.classList.remove("copied")
      },1500)
    })
  }

  row.appendChild(msg)
  row.appendChild(copyBtn)
  div.appendChild(row)
}else{
  let msg=document.createElement("span")
  msg.className="message"
  msg.innerText=text
  div.appendChild(msg)
}

let time=document.createElement("span")
time.className="msg-time"
time.innerText=timeNow()
div.appendChild(time)

box.appendChild(div)

box.scrollTop=box.scrollHeight

}

function showTyping(){
  let box=document.getElementById("chatBox")
  let div=document.createElement("div")
  div.className="bot"
  div.id="typingIndicator"
  div.innerHTML='<span class="message typing-dots"><span></span><span></span><span></span></span>'
  box.appendChild(div)
  box.scrollTop=box.scrollHeight
}

function hideTyping(){
  let el=document.getElementById("typingIndicator")
  if(el) el.remove()
}

function sendMessage(){

let input=document.getElementById("userInput")
let message=input.value

if(message==="") return

addMessage(message,"user")
showTyping()

fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
})
.then(res=>res.json())
.then(data=>{
hideTyping()
addMessage(data.reply,"bot")
})
.catch(()=>{
hideTyping()
addMessage("Sorry, something went wrong reaching the server.","bot")
})

input.value=""

}

function quickMsg(text){
document.getElementById("userInput").value=text
sendMessage()
}

function toggleFocus(){
  document.body.classList.toggle("focus-mode")
  document.getElementById("focusToggle").classList.toggle("on")
}

function clearChat(){
  document.getElementById("chatBox").innerHTML=""
  addMessage("Conversation cleared. How can I help with your health today?","bot")
}

addMessage("Hello! I'm CuraBot. How can I help with your health today?","bot")

document.getElementById("userInput").addEventListener("keydown", function(e){
  if(e.key === "Enter") sendMessage()
})

</script>

</body>
</html>
