<!DOCTYPE html>
<html>
<head>

<title>CuraBot AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Poppins, Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#b8f2d0,#2ccac7);
overflow:hidden;
}

/* BACKGROUND BLUR CIRCLES */

body::before{
content:"";
position:absolute;
width:350px;
height:350px;
background:#7ee2b8;
filter:blur(120px);
top:-80px;
left:-80px;
}

body::after{
content:"";
position:absolute;
width:300px;
height:300px;
background:#9af0c9;
filter:blur(120px);
bottom:-80px;
right:-80px;
}

/* MAIN CARD */

.chat-wrapper{
width:380px;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(15px);
border-radius:25px;
padding:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

/* HEADER */

.hero{
text-align:center;
margin-bottom:15px;
}

.hero img{
width:110px;
}

.hero h4{
margin-top:10px;
font-weight:600;
color:#1e5f47;
}

.hero p{
font-size:13px;
color:#2f6d58;
}

/* CHAT AREA */

.chat-box{
height:260px;
overflow-y:auto;
background:rgba(255,255,255,0.4);
border-radius:15px;
padding:12px;
}

/* MESSAGES */

.user{
text-align:right;
margin:6px 0;
}

.bot{
text-align:left;
margin:6px 0;
}

.message{
display:inline-block;
padding:10px 14px;
border-radius:15px;
max-width:70%;
font-size:14px;
}

.user .message{
background:#38b487;
color:white;
}

.bot .message{
background:#e8fff4;
}

/* QUICK BUTTONS */

.quick-buttons{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:8px;
}

.quick-buttons button{
border:none;
background:#e7fff3;
padding:6px 10px;
border-radius:12px;
font-size:12px;
color:#2c7a60;
}

/* INPUT */

.input-area{
display:flex;
margin-top:10px;
}

.input-area input{
flex:1;
border:none;
background:rgba(255,255,255,0.7);
padding:10px;
border-radius:20px;
}

.send-btn{
border:none;
background:#38b487;
color:white;
border-radius:50%;
padding:10px 14px;
margin-left:8px;
}
.floating-balls{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.floating-balls span{
position:absolute;
width:300px;           /* bigger balls */
height:300px;
background:white;
opacity:0.35;          /* darker */
border-radius:50%;
filter:blur(20px);
animation:floatRandom 25s ease-in-out infinite alternate;
}

/* Different starting positions */

.floating-balls span:nth-child(1){
top:20%;
left:10%;
animation-duration:28s;
}

.floating-balls span:nth-child(2){
top:60%;
left:20%;
animation-duration:24s;
}

.floating-balls span:nth-child(3){
top:30%;
left:55%;
animation-duration:30s;
}

.floating-balls span:nth-child(4){
top:70%;
left:75%;
animation-duration:26s;
}

.floating-balls span:nth-child(5){
top:10%;
left:80%;
animation-duration:32s;
}

.floating-balls span:nth-child(6){
top:50%;
left:40%;
animation-duration:27s;
}

/* RANDOM FLOATING MOVEMENT */

@keyframes floatRandom{

0%{
transform:translate(0px,0px);
}

25%{
transform:translate(120px,-80px);
}

50%{
transform:translate(-100px,120px);
}

75%{
transform:translate(80px,60px);
}

100%{
transform:translate(-120px,-100px);
}

}
.sidebar{
width:220px;
height:100vh;
background:linear-gradient(180deg,#1f3f3b,#2e5e57);
color:white;
position:fixed;
left:0;
top:0;
padding-top:30px;
}
.sidebar i{
margin-right:10px;
}

.sidebar a{
display:block;
padding:14px 22px;
color:white;
text-decoration:none;
margin:6px 12px;
border-radius:10px;
transition:0.3s;
}

.sidebar a:hover{
background:#3b7c73;
}

</style>
</head>

<body>
<div class="floating-balls">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="sidebar">

<h4>Cancer AI</h4>

<a href="/dashboard">
<i class="fa-solid fa-chart-line"></i> Dashboard
</a>

<a href="/analysis">
<i class="fa-solid fa-chart-line"></i> Analysis
</a>


<a href="/hospitals">
<i class="fa-solid fa-hospital"></i> Hospitals
</a>

<a href="/awareness">
<i class="fa-solid fa-ribbon"></i> Awareness
</a>

<a href="/report-analyzer">
<i class="fa-solid fa-file-medical"></i> Report Analyzer
</a>
<a href="/profile">
<i class="fa-solid fa-user"></i> Profile
</a>
</div>

<div class="chat-wrapper">

<div class="hero">

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">

<h4>CuraBot AI</h4>
<p>Your smart healthcare assistant</p>

</div>

<div class="quick-buttons">

<button onclick="quickMsg('fever')">Fever</button>
<button onclick="quickMsg('headache')">Headache</button>
<button onclick="quickMsg('cold')">Cold</button>
<button onclick="quickMsg('cough')">Cough</button>

</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">

<input id="userInput" placeholder="Ask your health question...">

<button class="send-btn" onclick="sendMessage()">➤</button>

</div>

</div>

<script>

function addMessage(text,sender){

let box=document.getElementById("chatBox")

let div=document.createElement("div")
div.className=sender

let msg=document.createElement("span")
msg.className="message"
msg.innerText=text

div.appendChild(msg)
box.appendChild(div)

box.scrollTop=box.scrollHeight

}

function sendMessage(){

let input=document.getElementById("userInput")
let message=input.value

if(message==="") return

addMessage(message,"user")

fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
})
.then(res=>res.json())
.then(data=>{
addMessage(data.reply,"bot")
})

input.value=""

}

function quickMsg(text){
document.getElementById("userInput").value=text
sendMessage()
}

addMessage("Hello! I'm CuraBot. How can I help with your health today?","bot")

</script>

</body>
</html>
