<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Symptom Analyzer — CancerAI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --teal: #0d9488;
    --teal-light: #14b8a6;
    --purple: #7c3aed;
    --grad-main: linear-gradient(135deg, #2563eb 0%, #0d9488 50%, #7c3aed 100%);
    --grad-hero: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #0c4a6e 100%);
    --glass-bg: rgba(255,255,255,0.07);
    --glass-border: rgba(255,255,255,0.15);
    --text-dark: #0f172a;
    --text-muted: #64748b;
    --radius: 20px;
    --shadow-card: 0 20px 60px rgba(15,23,42,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--grad-hero);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
  }

  /* Ambient orbs */
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(37,99,235,0.3) 0%, transparent 70%);
    top: -150px; left: -150px;
    border-radius: 50%;
    pointer-events: none;
    animation: floatOrb 8s ease-in-out infinite;
  }
  body::after {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,58,237,0.25) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    border-radius: 50%;
    pointer-events: none;
    animation: floatOrb 10s ease-in-out infinite reverse;
  }
  @keyframes floatOrb {
    0%,100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(30px) scale(1.05); }
  }

  /* ── NAVBAR ─────────────────────────────────────── */
  .navbar-custom {
    background: rgba(15,23,42,0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px 0;
    position: sticky; top: 0; z-index: 1000;
  }
  .navbar-brand-custom {
    display: flex; align-items: center; gap: 10px; text-decoration: none;
  }
  .brand-icon {
    width: 38px; height: 38px;
    background: var(--grad-main);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 17px;
    box-shadow: 0 0 20px rgba(37,99,235,0.4);
  }
  .brand-text {
    font-size: 1.1rem; font-weight: 700;
    background: var(--grad-main);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .brand-sub {
    font-size: 0.58rem; font-weight: 500; color: rgba(255,255,255,0.5);
    display: block; letter-spacing: 0.08em; -webkit-text-fill-color: rgba(255,255,255,0.5);
  }
  .nav-link-custom {
    color: rgba(255,255,255,0.75) !important;
    font-weight: 500; font-size: 0.88rem;
    padding: 8px 14px !important; border-radius: 8px; text-decoration: none;
    transition: color 0.2s ease;
  }
  .nav-link-custom:hover { color: #fff !important; }
  .nav-link-custom.active-link { color: #fff !important; }
  .btn-nav-primary {
    background: var(--grad-main); color: #fff !important;
    border: none; border-radius: 10px; font-weight: 600; font-size: 0.85rem;
    padding: 8px 20px; transition: all 0.25s ease;
    box-shadow: 0 4px 15px rgba(37,99,235,0.35);
    text-decoration: none;
  }
  .btn-nav-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37,99,235,0.45); }

  /* ── PAGE WRAPPER ───────────────────────────────── */
  .page-wrapper {
    min-height: calc(100vh - 66px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 50px 20px;
    position: relative; z-index: 1;
  }

  /* ── PAGE TITLE ─────────────────────────────────── */
  .page-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(37,99,235,0.18);
    border: 1px solid rgba(37,99,235,0.35);
    color: #93c5fd; font-size: 0.78rem; font-weight: 600;
    padding: 6px 16px; border-radius: 50px; margin-bottom: 20px;
    letter-spacing: 0.05em;
  }
  .page-eyebrow .dot {
    width: 7px; height: 7px; background: #22d3ee; border-radius: 50%;
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .page-title {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 800; color: #fff; text-align: center; margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .page-title .grad { 
    background: linear-gradient(90deg, #60a5fa, #34d399, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .page-subtitle {
    color: rgba(255,255,255,0.6); font-size: 0.95rem; text-align: center; margin-bottom: 36px;
  }

  /* ── PROGRESS BAR ───────────────────────────────── */
  .progress-wrap {
    width: 100%; max-width: 640px; margin-bottom: 28px;
  }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 0.78rem; color: rgba(255,255,255,0.5); margin-bottom: 8px;
  }
  .progress-track {
    height: 6px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--grad-main); border-radius: 20px;
    transition: width 0.5s ease;
    width: 0%;
  }

  /* ── QUESTION CARD ──────────────────────────────── */
  .question-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.13);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 24px;
    padding: 44px 40px;
    width: 100%; max-width: 640px;
    text-align: center;
    box-shadow: var(--shadow-card);
    animation: fadeSlide 0.55s ease;
  }
  @keyframes fadeSlide {
    from { opacity:0; transform:translateY(22px); }
    to   { opacity:1; transform:translateY(0);     }
  }

  .q-step {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em;
    color: #14b8a6; text-transform: uppercase; margin-bottom: 12px;
  }
  .q-text {
    font-size: 1.2rem; font-weight: 600; color: #fff;
    line-height: 1.5; margin-bottom: 30px;
  }
  .options-grid {
    display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
  }
  .option-btn {
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.85);
    padding: 12px 24px; border-radius: 50px;
    font-family: 'Poppins', sans-serif; font-size: 0.88rem; font-weight: 500;
    cursor: pointer; transition: all 0.25s ease;
  }
  .option-btn:hover {
    background: rgba(37,99,235,0.3);
    border-color: #2563eb;
    color: #fff;
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(37,99,235,0.3);
  }

  /* ── LOADER ─────────────────────────────────────── */
  .ai-loader-wrap { text-align: center; padding: 10px 0; }
  .ai-loader-wrap p { color: rgba(255,255,255,0.6); font-size: 0.88rem; margin-top: 18px; }
  .spinner-ring {
    width: 56px; height: 56px; margin: 0 auto;
    border: 5px solid rgba(255,255,255,0.1);
    border-top-color: #2563eb; border-right-color: #0d9488;
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── RESULT CARD ────────────────────────────────── */
  .result-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.13);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 24px;
    padding: 44px 40px;
    width: 100%; max-width: 580px;
    text-align: center;
    box-shadow: var(--shadow-card);
    animation: fadeSlide 0.55s ease;
    margin-top: 20px;
    max-width: 640px;
    width: 100%;
  }
  .result-card h4 {
    font-size: 1.35rem; font-weight: 700; color: #fff; margin-bottom: 24px;
  }
  .result-row {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 20px;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; text-align: left;
  }
  .result-row .label {
    font-size: 0.8rem; font-weight: 500; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.06em;
  }
  .result-row .value {
    font-size: 0.95rem; font-weight: 600; color: #fff;
  }
  .risk-track {
    height: 8px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; margin: 6px 0 18px;
  }
  .risk-fill {
    height: 100%; border-radius: 20px;
    transition: width 1s ease;
  }
  .risk-fill.low    { background: linear-gradient(90deg, #22c55e, #16a34a); }
  .risk-fill.medium { background: linear-gradient(90deg, #f59e0b, #d97706); }
  .risk-fill.high   { background: linear-gradient(90deg, #ef4444, #dc2626); }

  .advice-box {
    background: rgba(13,148,136,0.12);
    border: 1px solid rgba(13,148,136,0.25);
    border-radius: 14px; padding: 16px 20px;
    text-align: left; margin-bottom: 24px;
  }
  .advice-box p { font-size: 0.88rem; color: rgba(255,255,255,0.75); margin: 0; line-height: 1.6; }

  .btn-restart {
    background: var(--grad-main); color: #fff;
    border: none; border-radius: 12px; padding: 14px 36px;
    font-family: 'Poppins', sans-serif; font-size: 0.92rem; font-weight: 600;
    cursor: pointer; transition: all 0.25s ease;
    box-shadow: 0 8px 25px rgba(37,99,235,0.35);
  }
  .btn-restart:hover { transform: translateY(-3px); box-shadow: 0 14px 35px rgba(37,99,235,0.45); }

  /* ── CATEGORY BREAKDOWN ─────────────────────────── */
  .breakdown-section {
    text-align: left; margin-bottom: 24px;
  }
  .breakdown-title {
    font-size: 0.76rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(255,255,255,0.45); margin-bottom: 14px;
  }
  .category-row {
    margin-bottom: 14px;
  }
  .category-row-top {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
  }
  .category-name {
    font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.85);
    display: flex; align-items: center; gap: 8px;
  }
  .category-name i { width: 16px; color: #60a5fa; font-size: 0.8rem; }
  .category-pct { font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.6); }
  .category-track {
    height: 6px; background: rgba(255,255,255,0.08); border-radius: 20px; overflow: hidden;
  }
  .category-fill {
    height: 100%; border-radius: 20px; transition: width 1s ease;
  }
  .category-fill.low    { background: linear-gradient(90deg, #22c55e, #16a34a); }
  .category-fill.medium { background: linear-gradient(90deg, #f59e0b, #d97706); }
  .category-fill.high   { background: linear-gradient(90deg, #ef4444, #dc2626); }

  /* ── FLAGGED FACTORS ────────────────────────────── */
  .flags-section { text-align: left; margin-bottom: 24px; }
  .flag-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5; font-size: 0.76rem; font-weight: 600;
    padding: 6px 12px; border-radius: 50px; margin: 0 6px 8px 0;
  }
  .flag-chip.warn {
    background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.3); color: #fcd34d;
  }
  .flag-chip i { font-size: 0.72rem; }

  .urgent-banner {
    background: linear-gradient(135deg, rgba(239,68,68,0.18), rgba(220,38,38,0.1));
    border: 1px solid rgba(239,68,68,0.35);
    border-radius: 14px; padding: 14px 18px; margin-bottom: 20px;
    text-align: left; display: flex; gap: 12px; align-items: flex-start;
  }
  .urgent-banner i { color: #f87171; font-size: 1.1rem; margin-top: 2px; }
  .urgent-banner p { font-size: 0.84rem; color: rgba(255,255,255,0.85); margin: 0; line-height: 1.6; }

  .disclaimer-note {
    font-size: 0.72rem; color: rgba(255,255,255,0.4); text-align: left;
    margin-bottom: 20px; line-height: 1.6; font-style: italic;
  }

  /* ── SCROLLBAR ──────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: var(--grad-main); border-radius: 6px; }

  /* ── MOBILE SIDEBAR NAV ─────────────────────────── */
  .nav-toggle-btn {
    display: none;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    width: 38px; height: 38px;
    border-radius: 9px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(2,6,23,0.6);
    backdrop-filter: blur(2px);
    /* Must be BELOW .navbar-custom's z-index (1000): .nav-links-row lives
       inside .navbar-custom's stacking context, so its own z-index:1999
       only wins locally. Against outside elements, .navbar-custom's own
       z-index (1000) is what counts — an overlay above 1000 would render
       on top of the sidebar and swallow all its clicks. */
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .sidebar-overlay.open { display: block; opacity: 1; }

  .nav-close-btn {
    display: none;
    position: absolute;
    top: 16px; left: 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    width: 34px; height: 34px;
    border-radius: 8px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  @media (max-width: 860px) {
    .nav-toggle-btn { display: flex; }
    .nav-links-row {
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      width: min(78vw, 300px);
      margin: 0;
      flex-direction: column !important;
      align-items: stretch !important;
      background: rgba(15,23,42,0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255,255,255,0.1);
      padding: 74px 18px 24px;
      gap: 4px !important;
      transform: translateX(-100%);
      transition: transform 0.35s ease;
      z-index: 1999;
      overflow-y: auto;
    }
    .nav-links-row.open { transform: translateX(0); }
    .nav-close-btn { display: flex; }
    .nav-link-custom, .btn-nav-primary {
      width: 100%;
      padding: 12px 14px !important;
      border-radius: 10px;
    }
    .btn-nav-primary { margin-left: 0 !important; margin-top: 6px; justify-content: center; }
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar-custom">
  <div class="container" style="position:relative;">
    <div class="d-flex align-items-center justify-content-between w-100">
      <div class="d-flex align-items-center gap-2">
        <button class="nav-toggle-btn" id="navToggleBtn" aria-label="Toggle navigation">
          <i class="fa-solid fa-bars"></i>
        </button>
        <a href="/home" class="navbar-brand-custom">
          <div class="brand-icon"><i class="fas fa-dna"></i></div>
          <div>
            <span class="brand-text">CancerAI</span>
            <span class="brand-sub">ASSISTANT</span>
          </div>
        </a>
      </div>
      <div class="d-flex align-items-center gap-1 nav-links-row" id="navLinksRow">
        <button class="nav-close-btn" id="navCloseBtn" aria-label="Close navigation"><i class="fa-solid fa-xmark"></i></button>
        <a href="/dashboard" class="nav-link-custom"><i class="fa-solid fa-chart-line me-1"></i>Dashboard</a>
        <a href="/chatbot" class="nav-link-custom"><i class="fa-solid fa-robot me-1"></i>Chatbot</a>
        <a href="/hospitals" class="nav-link-custom"><i class="fa-solid fa-hospital me-1"></i>Hospitals</a>
        <a href="/awareness" class="nav-link-custom"><i class="fa-solid fa-ribbon me-1"></i>Awareness</a>
        <a href="/report-analyzer" class="nav-link-custom"><i class="fa-solid fa-file-medical me-1"></i>Reports</a>
        <a href="/profile" class="btn-nav-primary ms-2"><i class="fa-solid fa-user me-1"></i>Profile</a>
      </div>
    </div>
  </div>
</nav>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- PAGE CONTENT -->
<div class="page-wrapper">

  <div class="page-eyebrow"><span class="dot"></span> AI-Powered Risk Assessment</div>
  <h1 class="page-title">Symptom <span class="grad">Analyzer</span></h1>
  <p class="page-subtitle">Answer a few quick questions — our AI evaluates your risk profile instantly.</p>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progressLabel">Question 1 of 5</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressBar"></div>
    </div>
  </div>

  <!-- QUESTION CARD -->
  <div class="question-card" id="questionCard">
    <div class="q-step" id="qStep">Step 1</div>
    <div class="q-text" id="question"></div>
    <div class="options-grid" id="options"></div>
  </div>

  <!-- RESULTS (hidden initially) -->
  <div id="results"></div>

</div>

<script>
// Each question maps to a category used for the breakdown shown in results.
// Categories mirror common clinical "red flag" groupings rather than one flat score.
const questions = [
  // ── Demographics & history ──
  { q: "What is your age group?", options: ["Below 30","30–45","45–60","Above 60"], key: "age", category: "demographics" },
  { q: "Do you have a family history of cancer (parent or sibling)?", options: ["No","One relative","Multiple relatives"], key: "family_history", category: "demographics" },
  { q: "Do you smoke, or have you smoked regularly in the past?", options: ["Never","Former smoker","Occasional","Regular / heavy"], key: "smoking", category: "lifestyle" },
  { q: "How often do you consume alcohol?", options: ["Rarely / never","Occasionally","Frequently (most days)"], key: "alcohol", category: "lifestyle" },

  // ── Systemic / constitutional symptoms ──
  { q: "Have you experienced unexplained weight loss recently?", options: ["No","Slight (1–3 kg)","Significant (5kg+ without trying)"], key: "weight_loss", category: "systemic" },
  { q: "Do you feel persistent fatigue, even after resting?", options: ["No","Sometimes","Often, most days"], key: "fatigue", category: "systemic" },
  { q: "Have you had unexplained fevers or night sweats?", options: ["No","Occasionally","Recurrent / nightly"], key: "fever_sweats", category: "systemic" },

  // ── Respiratory ──
  { q: "Do you have a persistent cough?", options: ["No","Less than 3 weeks","More than 3 weeks"], key: "cough", category: "respiratory" },
  { q: "Have you noticed blood when coughing, or unexplained breathlessness?", options: ["No","Mild breathlessness only","Blood in cough / severe breathlessness"], key: "cough_blood", category: "respiratory" },

  // ── Lumps / skin / structural ──
  { q: "Have you noticed any new lump or swelling anywhere on your body?", options: ["No","Small, unchanged lump","Growing or hard lump"], key: "lump", category: "structural" },
  { q: "Have any moles or skin spots changed in size, shape, or color?", options: ["No","Slight change","Noticeable change or new irregular spot"], key: "skin_change", category: "structural" },

  // ── GI / urogenital ──
  { q: "Have you had any unusual or unexplained bleeding (stool, urine, or other)?", options: ["No","Once, minor","Repeated or noticeable bleeding"], key: "bleeding", category: "gi_urogenital" },
  { q: "Have you noticed changes in bowel or bladder habits lasting more than a few weeks?", options: ["No","Mild change","Persistent change"], key: "bowel_bladder", category: "gi_urogenital" },
  { q: "Do you have difficulty or pain when swallowing?", options: ["No","Occasionally","Frequently / worsening"], key: "swallowing", category: "gi_urogenital" }
];

const CATEGORY_META = {
  demographics:   { label: "Demographics & History", icon: "fa-user-clock" },
  lifestyle:      { label: "Lifestyle Risk Factors",  icon: "fa-smoking" },
  systemic:       { label: "Systemic Symptoms",       icon: "fa-temperature-high" },
  respiratory:    { label: "Respiratory Signs",       icon: "fa-lungs" },
  structural:     { label: "Lumps & Skin Changes",    icon: "fa-circle-exclamation" },
  gi_urogenital:  { label: "GI / Urogenital Signs",   icon: "fa-droplet" }
};

let answers = {};
let current = 0;

function showQuestion() {
  const q = questions[current];

  document.getElementById("qStep").textContent  = `Step ${current + 1}`;
  document.getElementById("question").textContent = q.q;

  const pct = Math.round((current / questions.length) * 100);
  document.getElementById("progressBar").style.width  = pct + "%";
  document.getElementById("progressPct").textContent  = pct + "%";
  document.getElementById("progressLabel").textContent = `Question ${current + 1} of ${questions.length}`;

  let html = "";
  q.options.forEach(opt => {
    html += `<button class="option-btn" onclick="selectAnswer('${q.key}','${opt}')">${opt}</button>`;
  });
  document.getElementById("options").innerHTML = html;

  // Re-trigger animation
  const card = document.getElementById("questionCard");
  card.style.animation = "none";
  requestAnimationFrame(() => { card.style.animation = "fadeSlide 0.45s ease"; });
}

function selectAnswer(key, val) {
  answers[key] = val;
  current++;
  if (current < questions.length) {
    showQuestion();
  } else {
    submitAnswers();
  }
}

function submitAnswers() {
  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("progressPct").textContent = "100%";
  document.getElementById("progressLabel").textContent = `Question ${questions.length} of ${questions.length}`;

  document.getElementById("questionCard").innerHTML = `
    <div class="ai-loader-wrap">
      <div class="spinner-ring"></div>
      <p>AI is analysing your symptoms…</p>
    </div>`;

  setTimeout(() => {
    fetch("/analyze_symptoms", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(answers)
    })
    .then(res => res.json())
    .then(data => {
      document.getElementById("questionCard").style.display = "none";

      let riskClass = "low";
      if (data.risk > 40) riskClass = "medium";
      if (data.risk > 70) riskClass = "high";

      // ── Category breakdown bars ──
      let breakdownHtml = "";
      if (data.categories) {
        Object.keys(data.categories).forEach(catKey => {
          const cat = data.categories[catKey];
          const meta = CATEGORY_META[catKey] || { label: catKey, icon: "fa-circle" };
          let cls = "low";
          if (cat.pct > 40) cls = "medium";
          if (cat.pct > 70) cls = "high";
          breakdownHtml += `
            <div class="category-row">
              <div class="category-row-top">
                <span class="category-name"><i class="fa-solid ${meta.icon}"></i> ${meta.label}</span>
                <span class="category-pct">${cat.pct}%</span>
              </div>
              <div class="category-track">
                <div class="category-fill ${cls}" style="width:${cat.pct}%"></div>
              </div>
            </div>`;
        });
      }

      // ── Flagged factors (chips) ──
      let flagsHtml = "";
      if (data.flags && data.flags.length) {
        data.flags.forEach(f => {
          const cls = f.level === "high" ? "" : "warn";
          flagsHtml += `<span class="flag-chip ${cls}"><i class="fa-solid fa-triangle-exclamation"></i> ${f.text}</span>`;
        });
      }

      // ── Urgent banner if escalation criteria met ──
      let urgentHtml = "";
      if (data.urgent) {
        urgentHtml = `
          <div class="urgent-banner">
            <i class="fa-solid fa-circle-exclamation"></i>
            <p>${data.urgent}</p>
          </div>`;
      }

      document.getElementById("results").innerHTML = `
        <div class="result-card">
          <h4>🧬 Symptom Analysis Result</h4>

          ${urgentHtml}

          <div class="result-row">
            <span class="label">Possible Concern Area</span>
            <span class="value">${data.condition}</span>
          </div>
          <div class="result-row">
            <span class="label">Severity</span>
            <span class="value">${data.severity}</span>
          </div>
          <div class="result-row" style="flex-direction:column; align-items:flex-start; gap:8px;">
            <div style="display:flex;justify-content:space-between;width:100%;">
              <span class="label">Overall Risk Score</span>
              <span class="value">${data.risk}%</span>
            </div>
            <div class="risk-track" style="width:100%;">
              <div class="risk-fill ${riskClass}" style="width:${data.risk}%"></div>
            </div>
          </div>

          <div class="breakdown-section">
            <div class="breakdown-title">Risk Breakdown by Category</div>
            ${breakdownHtml}
          </div>

          ${flagsHtml ? `<div class="flags-section">${flagsHtml}</div>` : ""}

          <div class="advice-box">
            <p>${data.advice}</p>
          </div>

          <p class="disclaimer-note">
            This tool offers a preliminary, educational risk indication based on patterns you've reported —
            it is not a diagnosis. Only a qualified clinician with proper examination and tests can diagnose
            any condition.
          </p>

          <button class="btn-restart" onclick="location.reload()">
            <i class="fas fa-redo me-2"></i>Start Again
          </button>
        </div>`;
    });
  }, 1600);
}

showQuestion();

/* MOBILE SIDEBAR NAV TOGGLE */
const navToggleBtn = document.getElementById("navToggleBtn");
const navLinksRow = document.getElementById("navLinksRow");
const navCloseBtn = document.getElementById("navCloseBtn");
const sidebarOverlay = document.getElementById("sidebarOverlay");

function openSidebar() {
  navLinksRow.classList.add("open");
  sidebarOverlay.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeSidebar() {
  navLinksRow.classList.remove("open");
  sidebarOverlay.classList.remove("open");
  document.body.style.overflow = "";
}

if (navToggleBtn && navLinksRow) {
  navToggleBtn.addEventListener("click", () => {
    navLinksRow.classList.contains("open") ? closeSidebar() : openSidebar();
  });
  navCloseBtn && navCloseBtn.addEventListener("click", closeSidebar);
  sidebarOverlay && sidebarOverlay.addEventListener("click", closeSidebar);
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeSidebar(); });
  navLinksRow.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", closeSidebar);
  });
}
</script>
</body>
</html>
