<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Symptom Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

body{
background-image:url("{{ url_for('static', filename='image.png') }}");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
font-family:'Poppins',sans-serif;
margin:0;
}

/* overlay */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
z-index:0;
}

.container, .sidebar{
position:relative;
z-index:1;
}

/* SIDEBAR */

.sidebar{
width:220px;
height:100vh;
background:linear-gradient(180deg,#1f3f3b,#2e5e57);
color:white;
position:fixed;
left:0;
top:0;
padding-top:30px;
}

.sidebar a{
display:block;
padding:14px 22px;
color:white;
text-decoration:none;
margin:6px 12px;
border-radius:10px;
transition:0.3s;
}

.sidebar a:hover{
background:#3b7c73;
}

/* CENTER CONTAINER */

.container{
margin-left:150px;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

/* TITLE */

h2{
color:#1f3f3b;
margin-bottom:25px;
}

/* QUESTION CARD */

.question-card{
background:rgba(255,255,255,0.9);
padding:40px;
border-radius:20px;
width:600px;
max-width:90%;
text-align:center;

box-shadow:0 20px 60px rgba(0,0,0,0.2);

animation:fadeSlide 0.6s ease;
}

/* BUTTONS */

.option-btn{
margin:10px;
padding:12px 25px;
border-radius:30px;
font-weight:500;
transition:0.3s;
}

.option-btn:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* PROGRESS */

.progress{
height:10px;
width:600px;
max-width:90%;
border-radius:20px;
margin-bottom:25px;
}

/* RESULT */

.result-card{
background:white;
padding:30px;
border-radius:20px;
margin-top:20px;
width:600px;
max-width:90%;
text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

/* AI LOADER */

.loader{
border:6px solid #f3f3f3;
border-top:6px solid #2e5e57;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin:auto;
margin-top:20px;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* animation */

@keyframes fadeSlide{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
.sidebar i{
margin-right:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<h5 class="text-center mb-4">Cancer AI</h5>

<a href="/dashboard">
<i class="fa-solid fa-chart-line"></i> Dashboard
</a>

<a href="/chatbot">
<i class="fa-solid fa-robot"></i> Chatbot
</a>

<a href="/hospitals">
<i class="fa-solid fa-hospital"></i> Hospitals
</a>

<a href="/awareness">
<i class="fa-solid fa-ribbon"></i> Awareness
</a>

<a href="/report-analyzer">
<i class="fa-solid fa-file-medical"></i> Report Analyzer
</a>

<a href="/profile">
<i class="fa-solid fa-user"></i> Profile
</a>

</div>


<div class="container">

<h2>AI Symptom Analyzer</h2>

<div class="progress">
<div class="progress-bar bg-success" id="progressBar"></div>
</div>

<div class="question-card">

<div id="question"></div>
<div id="options"></div>

</div>

<div id="results"></div>

</div>


<script>

let questions=[

{q:"What is your age group?",options:["Below 30","30-45","45-60","Above 60"],key:"age"},

{q:"Do you smoke?",options:["No","Occasionally","Regularly"],key:"smoking"},

{q:"Have you experienced unexplained weight loss?",options:["No","Slight","Significant"],key:"weight_loss"},

{q:"Do you have persistent cough?",options:["No","Few days","More than 3 weeks"],key:"cough"},

{q:"Do you feel chronic fatigue?",options:["No","Sometimes","Often"],key:"fatigue"}

]

let answers={}
let current=0

function showQuestion(){

let q=questions[current]

document.getElementById("question").innerHTML="<h5>"+q.q+"</h5>"

let html=""

q.options.forEach(opt=>{

html+=`<button class="btn btn-outline-success option-btn"
onclick="selectAnswer('${q.key}','${opt}')">${opt}</button>`

})

document.getElementById("options").innerHTML=html

updateProgress()

}

function selectAnswer(key,val){

answers[key]=val
current++

if(current<questions.length){

document.querySelector(".question-card").style.animation="fadeSlide 0.4s"

showQuestion()

}else{

submitAnswers()

}

}

function updateProgress(){

let percent=(current/questions.length)*100

document.getElementById("progressBar").style.width=percent+"%"

}

function submitAnswers(){

document.querySelector(".question-card").innerHTML=

`<h5>AI is analyzing your symptoms...</h5>
<div class="loader"></div>`

setTimeout(()=>{

fetch("/analyze_symptoms",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(answers)

})
.then(res=>res.json())
.then(data=>{

document.querySelector(".question-card").style.display="none"

/* risk color logic */

let color="bg-success"

if(data.risk>40) color="bg-warning"
if(data.risk>70) color="bg-danger"

document.getElementById("results").innerHTML=

`<div class="result-card">

<h4>Symptom Analysis Result</h4>

<p><b>Possible Condition:</b> ${data.condition}</p>

<p><b>Risk Level:</b> ${data.risk}%</p>

<div class="progress mb-3">
<div class="progress-bar ${color}" style="width:${data.risk}%"></div>
</div>

<p><b>Severity:</b> ${data.severity}</p>

<p>${data.advice}</p>

<button class="btn btn-success mt-3" onclick="location.reload()">
Start Again
</button>

</div>`

})

},1500)

}

showQuestion()

</script>

</body>
</html>
