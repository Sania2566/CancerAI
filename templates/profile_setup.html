<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Health Profile Setup</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:linear-gradient(135deg,#21b5ba8f,#01272a);
font-family:Poppins, sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* CARD */

.profile-card{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
padding:35px;
border-radius:20px;
width:720px;
max-width:100%;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
animation:fadeIn 0.6s ease;
}

/* TITLE */

.profile-card h3{
text-align:center;
margin-bottom:20px;
color:#2e5e57;
font-weight:600;
}

/* SECTION TITLE */

.section-title{
margin-top:30px;
margin-bottom:15px;
font-weight:600;
color:#1f3f3b;
border-bottom:2px solid #e6f3f3;
padding-bottom:6px;
display:flex;
align-items:center;
gap:8px;
}

/* INPUT GROUP */

.form-group{
margin-bottom:15px;
}

label{
font-weight:500;
margin-bottom:5px;
}

.input-icon{
position:relative;
margin-top:5px;
}

.input-icon i{
position:absolute;
top:70%;
left:12px;
transform:translateY(-50%);
color:#2e5e57;
}

.input-icon select{
padding-left:40px;
border-radius:10px;
height:42px;
}

/* BUTTON */

button{
margin-top:20px;
border-radius:25px;
padding:12px;
font-weight:500;
}

/* HIDE SECTION */

.hidden-section{
display:none;
animation:fadeIn 0.4s ease;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* RESPONSIVE */

@media(max-width:768px){

.profile-card{
padding:25px;
}

}

</style>

</head>

<body>

<div class="profile-card">

<h3>
<i class="fa-solid fa-heart-pulse"></i>
Health Profile Setup
</h3>

<form action="/save_profile" method="POST">

<input type="hidden" name="email" value="{{email}}">

<!-- BASIC INFO -->

<div class="section-title">
<i class="fa-solid fa-user"></i> Basic Information
</div>

<div class="form-group input-icon">
<label>Age</label>
<i class="fa-solid fa-calendar"></i>
<select name="age" class="form-control">
<option>Below 30</option>
<option>30-60</option>
<option>Above 60</option>
</select>
</div>

<div class="form-group input-icon">
<label>Smoking Habit</label>
<i class="fa-solid fa-smoking"></i>
<select name="smoking" class="form-control">
<option>Never</option>
<option>Occasionally</option>
<option>Regularly</option>
</select>
</div>

<!-- SYMPTOMS -->

<div class="section-title">
<i class="fa-solid fa-stethoscope"></i> Symptoms
</div>

<div class="form-group input-icon">
<label>Weight Loss</label>
<i class="fa-solid fa-weight-scale"></i>
<select name="weight_loss" class="form-control">
<option>No</option>
<option>Moderate</option>
<option>Significant</option>
</select>
</div>

<div class="form-group input-icon">
<label>Cough</label>
<i class="fa-solid fa-lungs"></i>
<select name="cough" class="form-control">
<option>No</option>
<option>Less than 2 weeks</option>
<option>More than 3 weeks</option>
</select>
</div>

<div class="form-group input-icon">
<label>Fatigue</label>
<i class="fa-solid fa-battery-quarter"></i>
<select name="fatigue" class="form-control">
<option>Rarely</option>
<option>Sometimes</option>
<option>Often</option>
</select>
</div>

<div class="form-group input-icon">
<label>Lump</label>
<i class="fa-solid fa-circle-exclamation"></i>
<select name="lump" class="form-control">
<option>No</option>
<option>Small lump</option>
<option>Growing lump</option>
</select>
</div>

<div class="form-group input-icon">
<label>Bleeding</label>
<i class="fa-solid fa-droplet"></i>
<select name="bleeding" class="form-control">
<option>No</option>
<option>Once</option>
<option>Repeated</option>
</select>
</div>

<div class="form-group input-icon">
<label>Difficulty Swallowing</label>
<i class="fa-solid fa-utensils"></i>
<select name="swallowing" class="form-control">
<option>No</option>
<option>Sometimes</option>
<option>Often</option>
</select>
</div>

<!-- LIFESTYLE -->

<div class="section-title">
<i class="fa-solid fa-heart"></i> Lifestyle
</div>

<div class="form-group input-icon">
<label>Exercise</label>
<i class="fa-solid fa-person-running"></i>
<select name="exercise" class="form-control">
<option>Regular</option>
<option>Sometimes</option>
<option>Rarely</option>
</select>
</div>

<div class="form-group input-icon">
<label>Diet Quality</label>
<i class="fa-solid fa-bowl-food"></i>
<select name="diet" class="form-control">
<option>Healthy</option>
<option>Average</option>
<option>Poor</option>
</select>
</div>

<!-- CANCER HISTORY -->

<div class="section-title">
<i class="fa-solid fa-ribbon"></i> Cancer History
</div>

<div class="form-group input-icon">
<label>Have you been diagnosed with cancer?</label>
<i class="fa-solid fa-dna"></i>
<select name="cancer" id="cancer" class="form-control">
<option value="No">No</option>
<option value="Yes">Yes</option>
</select>
</div>

<div id="cancer-details" class="hidden-section">

<div class="form-group input-icon">
<label>Cancer Type</label>
<i class="fa-solid fa-virus"></i>
<select name="cancer_type" class="form-control">
<option>Lung Cancer</option>
<option>Breast Cancer</option>
<option>Colon Cancer</option>
<option>Skin Cancer</option>
<option>Blood Cancer</option>
</select>
</div>

<div class="form-group input-icon">
<label>Cancer Stage</label>
<i class="fa-solid fa-chart-line"></i>
<select name="cancer_stage" class="form-control">
<option>Stage 1</option>
<option>Stage 2</option>
<option>Stage 3</option>
<option>Stage 4</option>
</select>
</div>

</div>

<button class="btn btn-success w-100">
<i class="fa-solid fa-save"></i> Save Health Profile
</button>

</form>

</div>

<script>

document.getElementById("cancer").addEventListener("change", function(){

let cancerSection = document.getElementById("cancer-details");

if(this.value === "Yes"){
cancerSection.style.display = "block";
}else{
cancerSection.style.display = "none";
}

});

</script>

</body>
</html>
